<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Solana-inspired gradient -->
    <linearGradient id="solanaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="50%" style="stop-color:#14F195"/>
      <stop offset="100%" style="stop-color:#00C2FF"/>
    </linearGradient>
    
    <!-- Dark inner gradient -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Outer glow for the shield -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9945FF" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0a0a14"/>
  
  <!-- Gradient ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#solanaGrad)" stroke-width="3" opacity="0.6"/>
  
  <!-- Shield / Vault shape -->
  <path d="M256 68 L406 148 L406 288 C406 368 340 432 256 456 C172 432 106 368 106 288 L106 148 Z" 
        fill="url(#innerGrad)" stroke="url(#solanaGrad)" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Inner shield highlight -->
  <path d="M256 92 L386 162 L386 282 C386 352 328 410 256 432 C184 410 126 352 126 282 L126 162 Z" 
        fill="none" stroke="url(#solanaGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Chat bubble - left -->
  <rect x="168" y="195" rx="16" ry="16" width="130" height="62" fill="url(#solanaGrad)" opacity="0.85"/>
  <!-- Chat bubble tail - left -->
  <polygon points="178,257 168,280 198,257" fill="#9945FF" opacity="0.85"/>
  
  <!-- Chat bubble - right -->
  <rect x="218" y="272" rx="16" ry="16" width="130" height="62" fill="url(#solanaGrad)" opacity="0.6"/>
  <!-- Chat bubble tail - right -->
  <polygon points="338,334 348,357 318,334" fill="#00C2FF" opacity="0.6"/>

  <!-- Lock icon on top bubble -->
  <!-- Lock body -->
  <rect x="216" y="218" rx="4" ry="4" width="30" height="24" fill="#0a0a14" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M221 218 L221 210 C221 202 226 197 231 197 C236 197 241 202 241 210 L241 218" 
        fill="none" stroke="#0a0a14" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Lock keyhole -->
  <circle cx="231" cy="228" r="3.5" fill="url(#solanaGrad)"/>
  <rect x="229.5" y="228" width="3" height="6" rx="1" fill="url(#solanaGrad)"/>
  
  <!-- Encrypted text lines on left bubble -->
  <rect x="180" y="210" rx="2" ry="2" width="24" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="180" y="220" rx="2" ry="2" width="18" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="180" y="230" rx="2" ry="2" width="22" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="180" y="240" rx="2" ry="2" width="14" height="4" fill="#0a0a14" opacity="0.5"/>
  
  <!-- Encrypted text lines on right bubble -->
  <rect x="232" y="286" rx="2" ry="2" width="24" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="232" y="296" rx="2" ry="2" width="30" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="232" y="306" rx="2" ry="2" width="18" height="4" fill="#0a0a14" opacity="0.5"/>
  <rect x="232" y="316" rx="2" ry="2" width="26" height="4" fill="#0a0a14" opacity="0.5"/>
  
  <!-- Lock icon on bottom bubble -->
  <rect x="274" y="288" rx="3" ry="3" width="24" height="20" fill="#0a0a14" opacity="0.7"/>
  <path d="M278 288 L278 282 C278 276 282 272 286 272 C290 272 294 276 294 282 L294 288" 
        fill="none" stroke="#0a0a14" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="286" cy="296" r="2.5" fill="url(#solanaGrad)" opacity="0.8"/>
  <rect x="285" y="296" width="2" height="5" rx="1" fill="url(#solanaGrad)" opacity="0.8"/>

  <!-- Solana-style speed lines (3 horizontal bars at bottom of shield) -->
  <line x1="186" y1="380" x2="326" y2="380" stroke="url(#solanaGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <line x1="196" y1="394" x2="316" y2="394" stroke="url(#solanaGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35" filter="url(#glow)"/>
  <line x1="210" y1="408" x2="302" y2="408" stroke="url(#solanaGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.2" filter="url(#glow)"/>

  <!-- Floating encryption particles -->
  <circle cx="145" cy="180" r="3" fill="#14F195" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="200" r="2.5" fill="#9945FF" opacity="0.5" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="350" r="2" fill="#00C2FF" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="330" r="2.5" fill="#14F195" opacity="0.45" filter="url(#glow)">
    <animate attributeName="opacity" values="0.45;0.1;0.45" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Small key icon floating -->
  <g transform="translate(365, 155) rotate(-30)" opacity="0.4" filter="url(#glow)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#14F195" stroke-width="2"/>
    <line x1="6" y1="0" x2="18" y2="0" stroke="#14F195" stroke-width="2"/>
    <line x1="15" y1="0" x2="15" y2="5" stroke="#14F195" stroke-width="2"/>
    <line x1="18" y1="0" x2="18" y2="4" stroke="#14F195" stroke-width="2"/>
  </g>
</svg>
